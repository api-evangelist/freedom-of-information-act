naftiko: 1.0.0-alpha2
info:
  label: Freedom of Information Act (FOIA) API — Agency Submission
  description: 'Freedom of Information Act (FOIA) API — Agency Submission. 1 operations. Lead operation: Submit a FOIA request
    to an agency component. Self-contained Naftiko capability covering one Freedom Of Information Act business surface.'
  tags:
  - Freedom Of Information Act
  - Agency Submission
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FREEDOM_OF_INFORMATION_ACT_API_KEY: FREEDOM_OF_INFORMATION_ACT_API_KEY
capability:
  consumes:
  - type: http
    namespace: freedom-of-information-act-agency-submission
    baseUri: https://api.foia.gov
    description: Freedom of Information Act (FOIA) API — Agency Submission business capability. Self-contained, no shared
      references.
    resources:
    - name: components-id-requests
      path: /components/{id}/requests/
      operations:
      - name: submitagencyrequest
        method: POST
        description: Submit a FOIA request to an agency component
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Unique identifier for the agency component.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.FREEDOM_OF_INFORMATION_ACT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: freedom-of-information-act-agency-submission-rest
    port: 8080
    description: REST adapter for Freedom of Information Act (FOIA) API — Agency Submission. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/components/{id}/requests
      name: components-id-requests
      description: REST surface for components-id-requests.
      operations:
      - method: POST
        name: submitagencyrequest
        description: Submit a FOIA request to an agency component
        call: freedom-of-information-act-agency-submission.submitagencyrequest
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: freedom-of-information-act-agency-submission-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freedom of Information Act (FOIA) API — Agency Submission. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: submit-foia-request-agency-component
      description: Submit a FOIA request to an agency component
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: freedom-of-information-act-agency-submission.submitagencyrequest
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
